version: "3.8"

services:
  pfcontrol:
    build:
      context: .
      dockerfile: Dockerfile.preview
    ports:
      - "9903:9903"
    environment:
      - NODE_ENV=production
      - PORT=9903
    env_file:
      - .env.production
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - pfcontrol-network

networks:
  pfcontrol-network:
    driver: bridge
