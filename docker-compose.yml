version: "3.8"

services:
  pfcontrol-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9900:9900"
    environment:
      - NODE_ENV=production
      - REALTIME_DELEGATED=true
    env_file:
      - .env.production
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - pfcontrol-network
    depends_on:
      - pfcontrol-realtime

  pfcontrol-realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REALTIME_PORT=8080
      - OVERVIEW_REFRESH_SEC=3
      - ARRIVALS_CACHE_SEC=5
    env_file:
      - .env.production
    restart: unless-stopped
    networks:
      - pfcontrol-network

networks:
  pfcontrol-network:
    driver: bridge
