services:
  pfcontrol:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9900:9900"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - pfcontrol-network

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pfcontrol
      POSTGRES_PASSWORD: pfcontrol
      POSTGRES_DB: pfcontrol
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - pfcontrol-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - pfcontrol-network

volumes:
  postgres_data:

networks:
  pfcontrol-network:
    driver: bridge