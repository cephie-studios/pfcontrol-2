name: bump-version

on:
  push:
    branches:
      - main
      - canary
    paths-ignore:
      - 'README.md'
      - 'VERSION'
  release:
    types: [published]

jobs:
  bump:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      deploy_title: ${{ steps.deploy_meta.outputs.title }}
      channel: ${{ steps.deploy_meta.outputs.channel }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VERSION_BUMP_PAT }}
          fetch-depth: 0

      - name: Capture deploy metadata
        id: deploy_meta
        run: |
          CHANNEL="${GITHUB_REF#refs/heads/}"
          if [[ "$CHANNEL" != "main" && "$CHANNEL" != "canary" ]]; then
            git fetch origin main canary
            SHA="${{ github.sha }}"
            if git branch -r --contains "$SHA" | grep -qE 'origin/main$'; then
              CHANNEL=main
            elif git branch -r --contains "$SHA" | grep -qE 'origin/canary$'; then
              CHANNEL=canary
            else
              echo "Could not resolve deploy channel" >&2
              exit 1
            fi
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            TITLE=$(jq -r '.head_commit.message // empty' "$GITHUB_EVENT_PATH" | head -n1)
          else
            TITLE="${{ github.event.release.name }}"
            if [[ -z "$TITLE" ]]; then
              TITLE="${{ github.event.release.tag_name }}"
            fi
          fi

          {
            echo "channel=$CHANNEL"
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Read and bump version
        id: version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r V1 V2 MINOR PATCH <<< "$CURRENT"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          while git ls-remote --tags origin "refs/tags/v$V1.$V2.$MINOR.$PATCH" | grep -q .; do
            echo "Tag v$V1.$V2.$MINOR.$PATCH already exists, incrementing patch..."
            PATCH=$((PATCH + 1))
          done

          NEW_VERSION="$V1.$V2.$MINOR.$PATCH"
          echo "$NEW_VERSION" > VERSION
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW_VERSION (trigger: ${{ github.event_name }})"

      - name: Commit and tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push origin "v${{ steps.version.outputs.version }}"

  deploy:
    needs: bump
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      channel: ${{ needs.bump.outputs.channel }}
      deploy_title: ${{ needs.bump.outputs.deploy_title }}
      deploy_description: v${{ needs.bump.outputs.version }}
