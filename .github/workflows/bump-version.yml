name: bump-version

on:
  push:
    branches:
      - main
      - canary
    paths-ignore:
      - 'README.md'
  release:
    types: [published]

jobs:
  bump:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      deploy_title: ${{ steps.deploy_meta.outputs.title }}
      channel: ${{ steps.deploy_meta.outputs.channel }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture deploy metadata
        id: deploy_meta
        run: |
          CHANNEL="${GITHUB_REF#refs/heads/}"
          if [[ "$CHANNEL" != "main" && "$CHANNEL" != "canary" ]]; then
            git fetch origin main canary
            SHA="${{ github.sha }}"
            MAIN_HEAD=$(git rev-parse origin/main)
            CANARY_HEAD=$(git rev-parse origin/canary)
            if [[ "$SHA" == "$MAIN_HEAD" ]]; then
              CHANNEL=main
            elif [[ "$SHA" == "$CANARY_HEAD" ]]; then
              CHANNEL=canary
            elif git branch -r --contains "$SHA" | grep -qE 'origin/canary$'; then
              CHANNEL=canary
            elif git branch -r --contains "$SHA" | grep -qE 'origin/main$'; then
              CHANNEL=main
            else
              echo "Could not resolve deploy channel" >&2
              exit 1
            fi
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            TITLE=$(jq -r '.head_commit.message // empty' "$GITHUB_EVENT_PATH" | head -n1)
          else
            TITLE="${{ github.event.release.name }}"
            if [[ -z "$TITLE" ]]; then
              TITLE="${{ github.event.release.tag_name }}"
            fi
          fi

          {
            echo "channel=$CHANNEL"
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute next version from tags
        id: version
        run: |
          git fetch --tags origin

          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [[ -z "$LATEST_TAG" ]]; then
            CURRENT="2.0.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
          fi

          IFS='.' read -r V1 V2 MINOR PATCH <<< "$CURRENT"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          while git ls-remote --tags origin "refs/tags/v$V1.$V2.$MINOR.$PATCH" | grep -q .; do
            echo "Tag v$V1.$V2.$MINOR.$PATCH already exists, incrementing patch..."
            PATCH=$((PATCH + 1))
          done

          NEW_VERSION="$V1.$V2.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW_VERSION (trigger: ${{ github.event_name }})"

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}" "${{ github.sha }}"
          git push origin "v${{ steps.version.outputs.version }}"

  deploy:
    needs: bump
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    permissions:
      contents: read
      deployments: write
    with:
      channel: ${{ needs.bump.outputs.channel }}
      deploy_title: ${{ needs.bump.outputs.deploy_title }}
      deploy_version: ${{ needs.bump.outputs.version }}
      deploy_description: v${{ needs.bump.outputs.version }}
