name: Deploy preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [canary]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to deploy
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    environment: preview-deploy
    env:
      PREVIEW_BRANCH: preview
      PREVIEW_URL: https://preview.pfcontrol.com
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || format('refs/pull/{0}/head', inputs.pr_number) }}
          token: ${{ secrets.VERSION_BUMP_PAT }}
          fetch-depth: 0

      - name: Force-push to preview branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin "+HEAD:refs/heads/${PREVIEW_BRANCH}"

      - name: Trigger Dokploy deploy (preview)
        run: |
          curl --fail-with-body -sS -X POST "https://${{ secrets.DOKPLOY_HOST }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "pfcontrol-preview-mwtcrl"}'

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_PAT }}
        run: |
          gh pr comment "${PR_NUMBER}" --body "Preview deploy triggered: ${PREVIEW_URL}"
